    label: Scaling decision sketch
    code: |
      active = inprogress + idle

      IF active < min nodes THEN
          start (min - active) nodes
      ELSE IF active == inprogress AND active+1 <= max allowed nodes THEN
          start 1 more node
      ELSE IF idle > 1 AND active > min nodes THEN
          kill (idle - 1) nodes
